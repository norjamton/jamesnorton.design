  Paste this into Webflow:
  - For a specific spot: Use a Custom Code Embed block
  - For site-wide: Project Settings > Custom Code > Footer Code

  Update the FUNCTION_URL after deploying the Cloud Function.
-->

<div id="visitor-counter" style="opacity: 0; transition: opacity 0.5s; font-family: 'Roboto Mono', monospace; font-size: 12px; color: #888;">
</div>

<script>
(function () {
  var FUNCTION_URL = "https://getvisitorcount-3qdu46aupa-uc.a.run.app";

  var el = document.getElementById("visitor-counter");
  if (!el) return;

  fetch(FUNCTION_URL)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.count) {
        el.textContent = "You are visitor #" + data.count.toLocaleString();
        el.style.opacity = "1";
      }
    })
    .catch(function () {
      el.style.display = "none";
    });
})();
</script>
